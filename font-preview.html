<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Pacifico&family=Satisfy&family=Pinyon+Script&display=swap" rel="stylesheet">
  <style>
    body {
      background: #fff;
      margin: 0;
      padding: 3rem 4rem;
      font-family: sans-serif;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      padding: 2rem 0;
      border-bottom: 1px solid #e8e8e8;
    }
    .option:last-child { border-bottom: none; }
    .number {
      font-size: 0.8rem;
      font-weight: 700;
      color: #999;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-width: 80px;
    }
    .name {
      font-size: 3.2rem;
      color: #000;
      line-height: 1.1;
      min-width: 340px;
    }
    .label {
      font-size: 0.78rem;
      color: #aaa;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .n1 { font-family: 'Dancing Script', cursive; font-weight: 700; }
    .n2 { font-family: 'Great Vibes', cursive; }
    .n3 { font-family: 'Pacifico', cursive; }
    .n4 { font-family: 'Satisfy', cursive; }
    .n5 { font-family: 'Pinyon Script', cursive; font-size: 3.8rem; }
  </style>
</head>
<body>
  <div class="option">
    <span class="number">Option 1</span>
    <span class="name n1">Peter Luro</span>
    <span class="label">Dancing Script — flowing, balanced</span>
  </div>
  <div class="option">
    <span class="number">Option 2</span>
    <span class="name n2">Peter Luro</span>
    <span class="label">Great Vibes — elegant, formal</span>
  </div>
  <div class="option">
    <span class="number">Option 3</span>
    <span class="name n3">Peter Luro</span>
    <span class="label">Pacifico — rounded, modern</span>
  </div>
  <div class="option">
    <span class="number">Option 4</span>
    <span class="name n4">Peter Luro</span>
    <span class="label">Satisfy — clean, casual cursive</span>
  </div>
  <div class="option">
    <span class="number">Option 5</span>
    <span class="name n5">Peter Luro</span>
    <span class="label">Pinyon Script — calligraphic, refined</span>
  </div>
</body>
</html>
